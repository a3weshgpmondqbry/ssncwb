<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vercel Git Flow Check</title>
    <style>
      :root {
        --bg: #f4f1e8;
        --ink: #161b22;
        --muted: #5d6773;
        --line: #d9d1c2;
        --blue: #265dff;
        --green: #138a62;
        --panel: #fffdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(120deg, rgba(38, 93, 255, 0.14), transparent 35%),
          linear-gradient(240deg, rgba(19, 138, 98, 0.14), transparent 32%),
          var(--bg);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
      }

      .shell {
        width: min(980px, 100%);
        display: grid;
        grid-template-columns: 1fr 0.76fr;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: rgba(255, 253, 248, 0.88);
        box-shadow: 0 22px 70px rgba(22, 27, 34, 0.12);
      }

      .intro {
        padding: 58px;
      }

      h1 {
        margin: 0;
        max-width: 660px;
        font-size: clamp(42px, 7vw, 82px);
        line-height: 0.96;
        letter-spacing: 0;
      }

      p {
        margin: 22px 0 0;
        max-width: 560px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.72;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 30px;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        border: 1px solid var(--blue);
        border-radius: 8px;
        padding: 0 18px;
        color: var(--blue);
        text-decoration: none;
        font-size: 15px;
        font-weight: 700;
      }

      a.primary {
        color: white;
        background: var(--blue);
      }

      .proof {
        display: grid;
        gap: 16px;
        align-content: center;
        border-left: 1px solid var(--line);
        padding: 42px;
        background: var(--panel);
      }

      .tile {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
        background: white;
      }

      .tile b {
        display: block;
        margin-bottom: 8px;
        font-size: 15px;
      }

      .tile span {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }

      .signal {
        display: grid;
        place-items: center;
        min-height: 180px;
        border-radius: 8px;
        background: #101820;
        color: white;
        text-align: center;
      }

      .signal strong {
        display: block;
        font-size: 62px;
        line-height: 1;
      }

      .signal span {
        display: block;
        margin-top: 8px;
        color: #b7d9ff;
        font-size: 14px;
      }

      @media (max-width: 780px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .intro,
        .proof {
          padding: 30px 24px;
        }

        .proof {
          border-top: 1px solid var(--line);
          border-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell" aria-label="Vercel Git integration check">
        <div class="intro">
          <h1>第二次自动上线测试</h1>
          <p>
            这个页面用来再次验证固定流程：先提交到 GitHub，再由 Vercel 自动发布。
            如果这里能打开，就说明这条链路已经跑通。
          </p>
          <div class="links">
            <a class="primary" href="https://github.com/a3weshgpmondqbry/ssncwb">查看仓库</a>
            <a href="https://vercel.com/max2014">查看 Vercel</a>
          </div>
        </div>
        <div class="proof">
          <div class="signal">
            <div>
              <strong>02</strong>
              <span>GitHub to Vercel</span>
            </div>
          </div>
          <div class="tile">
            <b>GitHub</b>
            <span>页面内容写入仓库，形成真实提交记录。</span>
          </div>
          <div class="tile">
            <b>Vercel</b>
            <span>仓库绑定后，每次 main 分支更新都会自动发布。</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
